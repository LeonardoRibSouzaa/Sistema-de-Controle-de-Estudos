<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./css/hearders.css">
    <link rel="stylesheet" href="./css/body.css">
    <link rel="stylesheet" href="./css/form_login.css">

    <title>Sistema de Controle de Estudos</title>
</head>
<body>

    <header class="header_login">
        <div class="logo_login">
            <img src="img/logo_completa.png" alt="Logo do Sistema" height="100%" >
        </div>
    </header>

    <main>
        <section class="container">
            <form id="login_form">
                <fieldset id="login_fieldset">
                    <legend>Login</legend>
                    <div>
                        <label for="usuario_id">Usuário</label>
                        <input type="text" name="usuario" id="usuario_id" required>
                    </div>

                    <div>
                        <label for="senha_id">Senha</label>
                        <input type="password" name="senha" id="senha_id" required>
                    </div>
                </fieldset>
                <div class="button_login">
                    <button type="submit">Entrar</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer"></footer>

</body>
</html>
